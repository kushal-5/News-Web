<div class="not-found-container">

  <div class="background-glow"></div>

  <div class="content">

    <span class="label">ERROR 404</span>

    <h1>Page Not Found</h1>

    <p>
      The news article or page you are looking for may have been moved,
      deleted, or does not exist.
    </p>

    <div class="buttons">
      <button routerLink="/home" class="primary-btn">
        Back to Home

      <button onclick="history.back()" class="secondary-btn">
        Go Back
      </button>
    </div>

  </div>

</div>
